<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Ascenso - Las 5 Fases</title>
    <meta name="description" content="Un RPG textual sobre las 5 fases del duelo.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="scanline"></div>
    
    <!-- Pantalla de Menú Principal -->
    <div id="main-menu">
        <h1 class="title">EL ASCENSO</h1>
        <p class="subtitle">Un viaje a través del vacío.</p>
        
        <div id="save-slots">
            <button class="save-slot" data-slot="1">Ranura 1: Vacía</button>
            <button class="save-slot" data-slot="2">Ranura 2: Vacía</button>
            <button class="save-slot" data-slot="3">Ranura 3: Vacía</button>
        </div>
        
        <button id="btn-delete-saves" class="danger-btn">Borrar todos los datos</button>
    </div>

    <!-- Contenedor del Juego -->
    <div id="game-container" style="display: none;">
        <div id="main-panel">
            <div id="console-output"></div>
            <div id="action-area">
                <div id="command-line">
                    <span class="prompt">></span>
                    <span id="typing-command"></span>
                    <span class="cursor">_</span>
                </div>
                <div id="button-container"></div>
                <div id="input-container" style="display:none; margin-top:10px; gap:10px; width:100%; display:flex;">
                    <input type="text" id="node-input" class="sys-input" placeholder=">_" autocomplete="off">
                    <button id="node-submit" class="sys-btn">Enviar</button>
                </div>
            </div>
        </div>
        <div id="side-panel">
            <h2>Inventario</h2>
            <ul id="inventory-list">
                <li class="empty-inv">Vacío</li>
            </ul>
            <div id="status-panel">
                <h2>Estado</h2>
                <p id="current-chapter">Capítulo: --</p>
            </div>
            
            <button id="btn-return-menu" class="sys-btn">Volver al Menú</button>
            <span id="auto-save-indicator">Partida Guardada</span>
        </div>
    </div>

    <div id="achievement-container">
        <div class="ach-title" id="ach-title">Logro Desbloqueado</div>
        <div class="ach-desc" id="ach-desc">Descripción</div>
    </div>

    <!-- Scripts modularizados -->
    <script src="js/story.js"></script>
    <script src="js/save.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
